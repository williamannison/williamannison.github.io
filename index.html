    <style>
      .body,
      .wrapper {
        /* Break the flow */
        position: absolute;
        top: 0px;

        /* Give them all the available space */
        width: 100%;
        height: 100%;

        /* Remove the margins if any */
        margin: 0;

        /* Allow them to scroll down the document */
        overscroll-behavior-y: contain;

      h1 {

  <body class="body">
    <!-- SIGN-IN / LOADING OVERLAY -->

    <div class="wrapper">

          <a href="https://docs.google.com/spreadsheets/d/1pi7p3_cWoOnOUnL1LAIijhebToyR8d354e7Zp_LokTA/edit?usp=sharing"

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <script>
      // =====================================================================
      // CONFIG — fill these in after following the README setup steps
      // =====================================================================
      const CONFIG = {
        // Apps Script web app URL (ends in /exec)
        SCRIPT_URL: 'PASTE_YOUR_APPS_SCRIPT_EXEC_URL_HERE',
        // OAuth 2.0 Web client ID — can be the same one as Toilet Scan v2
        CLIENT_ID: 'PASTE_YOUR_CLIENT_ID_HERE.apps.googleusercontent.com',
        HOSTED_DOMAIN: 'headlandsschool.co.uk'
      };

      // =====================================================================
      // AUTH — Google Identity Services (same pattern as Toilet Scan v2)
      // =====================================================================
      let ID_TOKEN = null;
      let USER_EMAIL = '';
      let tokenRefreshTimer = null;
      let appStarted = false;

      window.addEventListener('load', function() {
        const wait = setInterval(function() {
          if (window.google && google.accounts && google.accounts.id) {
            clearInterval(wait);
            initGoogleSignIn();
          }
        }, 100);
      });

      function initGoogleSignIn() {
        google.accounts.id.initialize({
          client_id: CONFIG.CLIENT_ID,
          callback: onCredential,
          auto_select: true,
          itp_support: true
        });
        google.accounts.id.renderButton(document.getElementById('gsi-button'), {
          theme: 'filled_blue',
          size: 'large',
          width: 280,
          text: 'signin_with'
        });
        google.accounts.id.prompt();
      }

      function decodeJwtPayload(token) {
        let base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        while (base64.length % 4) base64 += '=';
        return JSON.parse(decodeURIComponent(escape(atob(base64))));
      }

      function onCredential(response) {
        ID_TOKEN = response.credential;
        let payload;
        try {
          payload = decodeJwtPayload(ID_TOKEN);
        } catch (e) {
          setAuthStatus('Could not read sign-in response. Please try again.');
          return;
        }

        USER_EMAIL = (payload.email || '').toLowerCase();

        // Immediate feedback only — the server enforces this on every request
        if (!USER_EMAIL.endsWith('@' + CONFIG.HOSTED_DOMAIN)) {
          ID_TOKEN = null;
          setAuthStatus('Please sign in with your ' + CONFIG.HOSTED_DOMAIN + ' account.');
          return;
        }

        scheduleTokenRefresh(payload.exp);
        setAuthStatus('');
        hideSignIn();

        if (!appStarted) {
          appStarted = true;
          startApp();
        }
      }

      function scheduleTokenRefresh(exp) {
        if (tokenRefreshTimer) clearTimeout(tokenRefreshTimer);
        // Refresh 5 minutes before expiry; if the silent refresh fails, the
        // next API call returns an AUTH error and the overlay reappears.
        const msUntilRefresh = exp * 1000 - Date.now() - 5 * 60 * 1000;
        tokenRefreshTimer = setTimeout(function() {
          if (window.google && google.accounts && google.accounts.id) {
            google.accounts.id.prompt();
          }
        }, Math.max(msUntilRefresh, 60 * 1000));
      }

      function setAuthStatus(msg) {
        document.getElementById('auth-status').textContent = msg;
      }

      function showSignIn(message) {
        ID_TOKEN = null;
        document.getElementById('auth-spinner').style.display = 'none';
        document.getElementById('gsi-button').style.display = 'block';
        document.getElementById('auth-message').textContent =
          message || 'Sign in with your school Google account to continue.';
        document.getElementById('auth-overlay').style.display = 'flex';
      }

      function hideSignIn() {
        document.getElementById('auth-overlay').style.display = 'none';
      }

      // =====================================================================
      // API WRAPPER — replaces google.script.run
      // =====================================================================
      async function api(action, payload) {
        if (!ID_TOKEN) {
          showSignIn('Your session has expired. Please sign in again.');
          throw new Error('Not signed in');
        }
        const res = await fetch(CONFIG.SCRIPT_URL, {
          method: 'POST',
          // text/plain keeps this a "simple request" so no CORS preflight,
          // which Apps Script cannot answer
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ token: ID_TOKEN, action: action, payload: payload || {} })
        });
        if (!res.ok) {
          throw new Error('Network error (' + res.status + ')');
        }
        const json = await res.json();
        if (!json.ok) {
          if (json.code === 'AUTH') {
            showSignIn('Your session has expired. Please sign in again.');
          }
          throw new Error(json.error || 'Request failed');
        }
        return json.data;
      }

      // =====================================================================
      // AUDIO — Web Audio API sounds (identical to v1)
      // =====================================================================
      var audioContext = null;

      function initAudio() {
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContext.state === 'suspended') {
          audioContext.resume();
        }
      }

      // UK retail scanner beep (860 Hz square wave - industry standard)
      var audioBeep = {
        play: function() {
          if (!audioContext) initAudio();
          if (audioContext.state === 'suspended') audioContext.resume();

          var oscillator = audioContext.createOscillator();
          var gainNode = audioContext.createGain();

          var filter = audioContext.createBiquadFilter();
          filter.type = 'lowpass';
          filter.frequency.value = 3000;
          filter.Q.value = 1;

          oscillator.connect(filter);
          filter.connect(gainNode);
          gainNode.connect(audioContext.destination);

          oscillator.frequency.value = 860;
          oscillator.type = 'square';

          var now = audioContext.currentTime;
          gainNode.gain.setValueAtTime(0, now);
          gainNode.gain.linearRampToValueAtTime(0.25, now + 0.003);
          gainNode.gain.setValueAtTime(0.25, now + 0.05);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.08);

          oscillator.start(now);
          oscillator.stop(now + 0.08);
        }
      };

      // Pleasant notification sound (for H/D/P permissions)
      var audioHonk = {
        play: function() {
          if (!audioContext) initAudio();
          if (audioContext.state === 'suspended') audioContext.resume();

          var now = audioContext.currentTime;

          // First tone (G note - 784 Hz)
          var osc1 = audioContext.createOscillator();
          var gain1 = audioContext.createGain();

          osc1.connect(gain1);
          gain1.connect(audioContext.destination);

          osc1.frequency.value = 784;
          osc1.type = 'sine';

          gain1.gain.setValueAtTime(0, now);
          gain1.gain.linearRampToValueAtTime(0.18, now + 0.01);
          gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

          osc1.start(now);
          osc1.stop(now + 0.15);

          // Second tone (E note - 659 Hz)
          var osc2 = audioContext.createOscillator();
          var gain2 = audioContext.createGain();

          osc2.connect(gain2);
          gain2.connect(audioContext.destination);

          osc2.frequency.value = 659;
          osc2.type = 'sine';

          gain2.gain.setValueAtTime(0, now + 0.08);
          gain2.gain.linearRampToValueAtTime(0.18, now + 0.09);
          gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.25);

          osc2.start(now + 0.08);
          osc2.stop(now + 0.25);
        }
      };

      // Attention alert (for Y/L/invalid) — three-tone ascending pattern
      var audioWhistle = {
        play: function() {
          if (!audioContext) initAudio();
          if (audioContext.state === 'suspended') audioContext.resume();

          var now = audioContext.currentTime;
          var frequencies = [523, 659, 784]; // C, E, G notes

          for (var i = 0; i < 3; i++) {
            var osc = audioContext.createOscillator();
            var gain = audioContext.createGain();

            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.frequency.value = frequencies[i];
            osc.type = 'sine';

            var startTime = now + (i * 0.08);
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.2, startTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.12);

            osc.start(startTime);
            osc.stop(startTime + 0.12);
          }
        }
      };

      document.addEventListener('touchstart', initAudio, { once: true });
      document.addEventListener('click', initAudio, { once: true });

      // Keep audio context alive for iOS
      setInterval(function() {
        if (audioContext && audioContext.state === 'suspended') {
          audioContext.resume();
        }
      }, 1000);

      function play() {
        if (audioContext && audioContext.state === 'suspended') {
          audioContext.resume();
        }
        audioHonk.play();
      }

      function play1() {
        if (audioContext && audioContext.state === 'suspended') {
          audioContext.resume();
        }
        audioWhistle.play();
      }

      // =====================================================================
      // SCANNER
      // =====================================================================
      let html5QrCode = null;

      function safeResume() {
        try {
          if (html5QrCode) html5QrCode.resume();
        } catch (e) {
          // resume() throws if the scanner is not paused — safe to ignore
        }
      }

      function startScanner() {
        html5QrCode = new Html5Qrcode("qr-reader");
        const config = {
          fps: 10,
          qrbox: undefined,
          aspectRatio: 1,
          disableFlip: false,
          focusMode: "continuous",
          advanced: [{ zoom: 1.5 }],
          willReadFrequently: true
        };

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
          .then(function() {
            document.getElementById('scanner-status').textContent = '🎥 Scanner Active - Ready to Scan';
          })
          .catch(function(err) {
            console.error('Scanner error:', err);
            html5QrCode = null;
            document.getElementById('scanner-status').textContent = '⚠️ Camera unavailable - use keypad below';
            document.getElementById('scanner-status').style.background = 'linear-gradient(135deg, #f59e0b 0%, #d97706 100%)';
          });
      }

      function onScanSuccess(decodedText, decodedResult) {
        // Resume audio context if suspended (iOS fix)
        if (audioContext && audioContext.state === 'suspended') {
          audioContext.resume();
        }
        audioBeep.play();

        document.getElementById("username").value = decodedText;
        console.log("decoded text " + decodedText);

        if (html5QrCode) html5QrCode.pause(true);

        doStuff();
      }

      // =====================================================================
      // APP START (after sign-in)
      // =====================================================================
      function startApp() {
        startScanner();
        refreshCache();
        // Periodic cache refresh (every 1 minute, as in v1)
        setInterval(refreshCache, 60000);
      }

      function refreshCache() {
        if (!ID_TOKEN) return;
        api('initializeCache')
          .then(function(count) {
            console.log('Cache refreshed with ' + count + ' students');
          })
          .catch(function(error) {
            console.error('Cache refresh failed:', error);
          });
      }

      // =====================================================================
      // SCAN / INPUT HANDLING
      // =====================================================================
      document.getElementById("username").select();

      var input = document.getElementById("username");
      input.addEventListener("keyup", function(event) {
        if (event.keyCode === 13) {
          event.preventDefault();
          document.getElementById("btn").click();
        }
      });
      input.addEventListener("keydown", function(event) {
        if (event.keyCode === 110) {
          event.preventDefault();
          document.getElementById("btn").click();
        }
      });
      input.addEventListener("keydown", function(event) {
        if (event.keyCode === 190) {
          event.preventDefault();
          document.getElementById("btn").click();
        }
      });

      document.getElementById("btn").addEventListener("click", doStuff);

      function doStuff() {
        var name = document.getElementById("username").value;
        document.getElementById("username").value = "";
        if (!name) {
          safeResume();
          return;
        }

        api('userClicked', { number: name })
          .then(function(j) {
            if (!j) {
              // Debounced (scanned twice within 10 seconds) — just resume
              safeResume();
              return;
            }
            addRowBelow(j);
          })
          .catch(function(error) {
            console.error('Scan failed:', error);
            safeResume();
          });
      }

      // Manual return function - bypasses debounce (click a row)
      function manualReturn(studentNumber) {
        console.log("Manual return for student: " + studentNumber);
        api('manualReturn', { number: studentNumber })
          .then(function(j) {
            if (!j) return;
            addRowBelow(j);
          })
          .catch(function(error) {
            console.error('Manual return failed:', error);
          });
      }

      // =====================================================================
      // TABLE RENDERING (ported from v1)
      // =====================================================================
      function addRowBelow(j) {
        if (!j) {
          safeResume();
          return;
        }

        var test = "OUT";
        var tbody = document.getElementById("table-body");

        for (var i = 0; i < tbody.rows.length; i++) {

          if (tbody.rows[i].cells[1].textContent === String(j[1])) {
            test = "RETURNED";
            tbody.rows[i].cells[5].textContent = "RETURNED " + j[0];

            var box0 = tbody.rows[i].cells[0].textContent;
            var box1 = tbody.rows[i].cells[1].textContent;
            var box2 = tbody.rows[i].cells[2].textContent;
            var box3 = tbody.rows[i].cells[3].textContent;
            var box4 = tbody.rows[i].cells[4].textContent;
